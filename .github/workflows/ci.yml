name: 持续集成

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

permissions:
  contents: read

jobs:
  server:
    name: 服务端检查
    runs-on: [self-hosted, Linux, X64]
    defaults:
      run:
        working-directory: server
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 配置 Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: server/go.sum

      - name: 执行测试
        run: go test ./...

      - name: 构建 Linux 二进制
        if: github.ref == 'refs/heads/master'
        run: go build -trimpath -buildvcs=false -o bin/agent ./cmd/agent

      - name: 上传服务端构建产物
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: frp-server-linux-amd64
          path: server/bin/agent
          if-no-files-found: error
          retention-days: 7

  client:
    name: 客户端检查
    runs-on: windows-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 配置 Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache-dependency-path: client/go.sum

      - name: 安装 Wails v3 CLI
        if: github.ref == 'refs/heads/master'
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.117

      - name: 创建前端嵌入占位文件
        run: |
          New-Item -ItemType Directory -Force frontend/dist | Out-Null
          New-Item -ItemType File -Force frontend/dist/.gitkeep | Out-Null

      - name: 执行 Go 测试
        run: go test ./...

      - name: 构建 Windows 客户端
        if: github.ref == 'refs/heads/master'
        run: wails3 package

      - name: 上传客户端构建产物
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: frp-manager-windows-amd64
          path: client/bin/frp-manager.exe
          if-no-files-found: error
          retention-days: 7

      - name: 上传 Windows 安装程序
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v4
        with:
          name: frp-manager-windows-installer-amd64
          path: client/bin/frp-manager-amd64-installer.exe
          if-no-files-found: error
          retention-days: 7
