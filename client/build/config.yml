# Wails v3 项目配置
version: '3'

info:
  companyName: "kdc"
  productName: "FRP Manager"
  productIdentifier: "com.kdc.frp-manager"
  description: "基于 frp 的本地 GUI 内网穿透管理系统"
  copyright: "(c) 2026, kdc"
  comments: "FRP Manager 客户端"
  version: "0.1.0"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
      - "*_test.go"
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary
